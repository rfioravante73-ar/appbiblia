<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>La Biblia Versión Reina Valera | Visor de Escrituras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ----- VARIABLES: AZUL OSCURO + DORADO ----- */
        :root {
            --blue-deep: #0a1a2f;
            --blue-mid: #0f2a3f;
            --blue-card: #112c42;
            --gold-primary: #d4af37;
            --gold-soft: #e5c56b;
            --silver-light: #eef2f5;
            --text-light: #f0f4fa;
            --text-muted: #b9c7d9;
            --danger-red: #c0392b;
            --shadow-card: 0 15px 35px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s ease;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Merriweather', serif;
        }

        body {
            background: linear-gradient(145deg, var(--blue-deep) 0%, #071421 100%);
            color: var(--text-light);
            font-family: var(--font-body);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----- LOGIN PAGE ----- */
        #login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 20000;
            background: var(--blue-deep);
            transition: transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
        }

        #login-page.slide-up {
            transform: translateY(-100%);
        }

        .login-left {
            flex: 1;
            background: radial-gradient(circle at 10% 30%, var(--blue-mid), #051220);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            backdrop-filter: blur(1px);
        }

        .login-left::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48cGF0aCBmaWxsPSIjZmZmZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDMiIGQ9Ik0zMCA1TDUgMzBsMjUgMjUgMjUtMjV6Ii8+PC9zdmc+');
            opacity: 0.2;
            pointer-events: none;
        }

        .login-image {
            width: 100%;
            max-width: 260px;
            margin-bottom: 1.8rem;
            text-align: center;
        }

        .login-image img {
            width: 100%;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5));
            border-radius: 12px;
        }

        .login-brand h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            text-transform: none;
            letter-spacing: 1px;
            color: var(--gold-primary);
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
        }

        .login-brand p {
            font-family: var(--font-heading);
            font-size: 1rem;
            border-top: 1px solid var(--gold-soft);
            padding-top: 1rem;
            color: var(--gold-soft);
            text-align: center;
        }

        .login-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(10, 26, 47, 0.85);
            backdrop-filter: blur(5px);
        }

        .login-box {
            background: rgba(17, 34, 56, 0.9);
            backdrop-filter: blur(12px);
            padding: 2.8rem;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .login-box h2 {
            font-family: var(--font-heading);
            color: var(--gold-primary);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--silver-light);
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 14px;
            color: white;
            font-family: var(--font-body);
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-primary);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--gold-primary);
            color: #0a1a2f;
            border: none;
            font-family: var(--font-heading);
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: #e6c150;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .error-msg {
            color: #f28b82;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #071421;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 15000;
            transition: opacity 0.6s ease, visibility 0.6s;
            opacity: 0;
            visibility: hidden;
        }

        #loading-screen.active {
            opacity: 1;
            visibility: visible;
        }

        .loader-icon {
            font-size: 3.5rem;
            color: var(--gold-primary);
            animation: spin 2s infinite linear;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* MAIN APP CONTAINER (IFRAME + HEADER) */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #app-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* HEADER AZUL OSCURO CON DORADO */
        .app-header {
            background: #081c2e;
            border-bottom: 3px solid var(--gold-primary);
            padding: 0.8rem 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            z-index: 20;
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.2rem, 5vw, 2rem);
            text-transform: none;
            color: var(--gold-primary);
            letter-spacing: 1px;
            margin: 0;
            text-align: left;
            line-height: 1.3;
            word-break: break-word;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .logout-btn-header {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
        }

        .logout-btn-header:hover {
            background: var(--gold-primary);
            color: #0a1a2f;
            transform: translateY(-2px);
        }

        /* IFRAME CONTAINER: OCUPA TODO EL RESTO */
        .iframe-wrapper {
            flex: 1;
            position: relative;
            background: #010a14;
            overflow: hidden;
        }

        .bible-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: all 0.2s;
        }

        /* MODAL DE CONFIRMACIÓN (SALIDA, ESTILO UNIFICADO) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-danger {
            background: #11212e;
            width: 90%;
            max-width: 420px;
            border-radius: 28px;
            border-top: 5px solid var(--danger-red);
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .modal-header-danger {
            background: #0e1a26;
            padding: 1.3rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .modal-header-danger h3 {
            color: var(--gold-soft);
            font-family: var(--font-heading);
            margin: 0;
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--silver-light);
            transition: 0.2s;
        }

        .close-modal-btn:hover {
            color: var(--danger-red);
        }

        .modal-body-danger {
            padding: 2rem;
            text-align: center;
        }

        .danger-icon {
            font-size: 3rem;
            color: var(--danger-red);
            margin-bottom: 1rem;
        }

        .danger-text {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: var(--text-light);
        }

        .danger-actions {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .btn-cancel {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            background: #1f2f3e;
        }

        .btn-danger {
            background: var(--danger-red);
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-family: var(--font-heading);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-danger:hover {
            background: #a82313;
            transform: scale(1.02);
        }

        /* ===== RESPONSIVE MEJORADO PARA MÓVIL (sin alterar escritorio) ===== */
        @media (max-width: 768px) {
            /* Ajustes generales de espaciado en login */
            .login-box {
                padding: 1.8rem;
                margin: 1rem;
                max-width: 90%;
            }
            .login-box h2 {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }
            .form-control {
                padding: 0.8rem 0.9rem;
                font-size: 0.95rem;
            }
            .login-btn {
                padding: 0.8rem;
                font-size: 1rem;
            }
            /* Ajuste de la imagen del login para que no se desborde */
            .login-image {
                max-width: 180px;
                margin-bottom: 1rem;
            }
            .login-brand h1 {
                font-size: clamp(1.4rem, 5vw, 2rem);
            }
            .login-brand p {
                font-size: 0.85rem;
            }
            /* Header responsivo más compacto */
            .app-header {
                padding: 0.6rem 1rem;
            }
            .header-inner {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 0.6rem;
            }
            .logo-area h1 {
                font-size: 1.3rem;
                text-align: center;
            }
            .logout-btn-header {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
            /* Asegurar que el iframe use todo el espacio vertical disponible */
            .iframe-wrapper {
                min-height: 0;
                flex: 1;
            }
            /* Modal ajustado para móviles */
            .modal-danger {
                width: 85%;
                max-width: 340px;
            }
            .modal-header-danger {
                padding: 1rem 1.2rem;
            }
            .modal-body-danger {
                padding: 1.5rem;
            }
            .danger-text {
                font-size: 1rem;
            }
            .danger-actions {
                gap: 0.8rem;
            }
            .btn-cancel, .btn-danger {
                padding: 0.6rem 1.2rem;
            }
        }

        /* Para pantallas muy pequeñas (menos de 480px) refinamos aún más */
        @media (max-width: 480px) {
            .login-box {
                padding: 1.5rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
            .login-brand h1 {
                font-size: 1.4rem;
            }
            .logo-area h1 {
                font-size: 1.1rem;
            }
            .logout-btn-header {
                font-size: 0.8rem;
                padding: 0.4rem 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-page">
        <div class="login-left">
            <div class="login-image">
                <img src="https://github.com/rfioravante73-ar/cronos/blob/main/biblia.png?raw=true" alt="Santa Biblia">
            </div>
            <div class="login-brand">
                <h1>La Biblia Versión Reina Valera</h1>
                <p>Lectura y estudio de la Palabra</p>
            </div>
        </div>
        <div class="login-right">
            <div class="login-box">
                <h2>Acceso al Visor</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Usuario</label>
                        <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Ingresar</button>
                    <p class="error-msg" id="loginError"><i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos.</p>
                </form>
            </div>
        </div>
    </div>

    <!-- LOADING SIMULADO -->
    <div id="loading-screen">
        <div class="loader-icon"><i class="fas fa-hourglass-half"></i></div>
        <h3 style="color: var(--gold-soft);">Cargando Escrituras...</h3>
        <p style="color: #9aaec2;">Preparando el visor bíblico</p>
    </div>

    <!-- APP PRINCIPAL: IFRAME + HEADER -->
    <div id="app-container">
        <header class="app-header">
            <div class="header-inner">
                <div class="logo-area">
                    <h1><i class="fas fa-bible"></i> La Biblia Versión Reina Valera</h1>
                </div>
                <div class="header-actions">
                    <button class="logout-btn-header" id="logoutMainBtn"><i class="fas fa-sign-out-alt"></i> Salir</button>
                </div>
            </div>
        </header>
        <div class="iframe-wrapper">
            <iframe id="bibleIframe" class="bible-iframe" title="Santa Biblia RV60" src="about:blank"></iframe>
        </div>
    </div>

    <!-- MODAL DE CONFIRMACIÓN DE SALIDA -->
    <div class="modal-overlay" id="logoutModalOverlay">
        <div class="modal-danger">
            <div class="modal-header-danger">
                <h3><i class="fas fa-door-open"></i> Cerrar sesión</h3>
                <button class="close-modal-btn" id="closeLogoutModalBtn">&times;</button>
            </div>
            <div class="modal-body-danger">
                <div class="danger-icon"><i class="fas fa-sign-out-alt"></i></div>
                <div class="danger-text">¿Deseas salir del visor bíblico? Deberás iniciar sesión nuevamente.</div>
                <div class="danger-actions">
                    <button class="btn-cancel" id="cancelLogoutBtn">Cancelar</button>
                    <button class="btn-danger" id="confirmLogoutBtn">Salir</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ----- CREDENCIALES LOCALES (NO VISIBLES EN LA UI) -----
        const VALID_USERNAME = "Usuario";
        const VALID_PASSWORD = "159753";

        // Elementos DOM
        const loginPage = document.getElementById('login-page');
        const appContainer = document.getElementById('app-container');
        const loadingScreen = document.getElementById('loading-screen');
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginErrorMsg = document.getElementById('loginError');
        const logoutMainBtn = document.getElementById('logoutMainBtn');
        const logoutModal = document.getElementById('logoutModalOverlay');
        const closeLogoutModal = document.getElementById('closeLogoutModalBtn');
        const cancelLogout = document.getElementById('cancelLogoutBtn');
        const confirmLogout = document.getElementById('confirmLogoutBtn');
        const bibleIframe = document.getElementById('bibleIframe');

        // URL de la Biblia a incrustar
        const BIBLE_URL = "https://rfioravante73-ar.github.io/appbiblia/bibliaRV60.html";

        // Variable para mantener estado de sesión (opcional)
        let isLoggedIn = false;

        // Helper: mostrar app principal
        function showMainApp() {
            loadingScreen.classList.remove('active');
            setTimeout(() => {
                appContainer.classList.add('visible');
                loginPage.classList.add('slide-up');
                if (bibleIframe.src !== BIBLE_URL) {
                    bibleIframe.src = BIBLE_URL;
                }
                isLoggedIn = true;
            }, 200);
        }

        // Regresar al login y reiniciar estado
        function showLoginAndReset() {
            // Limpiar iframe
            bibleIframe.src = "about:blank";
            appContainer.classList.remove('visible');
            loginPage.classList.remove('slide-up');
            loadingScreen.classList.remove('active');
            // Limpiar campos del formulario
            if (usernameInput) usernameInput.value = '';
            if (passwordInput) passwordInput.value = '';
            loginErrorMsg.style.display = 'none';
            isLoggedIn = false;
        }

        // Validar credenciales localmente
        function attemptLogin(username, password) {
            return (username === VALID_USERNAME && password === VALID_PASSWORD);
        }

        // Evento de envío del login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                loginErrorMsg.style.display = 'block';
                loginErrorMsg.textContent = 'Por favor ingresa usuario y contraseña.';
                return;
            }

            loadingScreen.classList.add('active');
            loginErrorMsg.style.display = 'none';

            // Pequeña demora para simular carga
            setTimeout(() => {
                if (attemptLogin(username, password)) {
                    showMainApp();
                } else {
                    loadingScreen.classList.remove('active');
                    loginErrorMsg.style.display = 'block';
                    loginErrorMsg.textContent = 'Usuario o contraseña incorrectos.';
                }
            }, 500);
        });

        // Cerrar sesión: modal y acción
        function openLogoutModal() {
            logoutModal.classList.add('active');
        }
        
        function closeLogoutModalFunc() {
            logoutModal.classList.remove('active');
        }
        
        function performLogout() {
            closeLogoutModalFunc();
            loadingScreen.classList.add('active');
            setTimeout(() => {
                showLoginAndReset();
                loadingScreen.classList.remove('active');
            }, 400);
        }
        
        logoutMainBtn.addEventListener('click', openLogoutModal);
        closeLogoutModal.addEventListener('click', closeLogoutModalFunc);
        cancelLogout.addEventListener('click', closeLogoutModalFunc);
        confirmLogout.addEventListener('click', performLogout);
        
        // Cerrar modal si se hace clic en el overlay
        logoutModal.addEventListener('click', (e) => {
            if (e.target === logoutModal) closeLogoutModalFunc();
        });

        // Al cargar la página, garantizar estado inicial sin sesión
        window.addEventListener('load', () => {
            showLoginAndReset();
            bibleIframe.src = "about:blank";
        });
    </script>
</body>
</html>
